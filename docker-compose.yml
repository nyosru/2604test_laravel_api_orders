services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: php
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    ports:
      - "8000:8000"
    environment:
      COMPOSER_ALLOW_SUPERUSER: "1"
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "php", "-r", "$$headers = @get_headers('http://0.0.0.0:8000/up'); exit(str_contains($$headers[0] ?? '', '200') ? 0 : 1);"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_orders_queue
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: php artisan queue:work redis --sleep=3 --tries=3 --timeout=90
    depends_on:
      php:
        condition: service_healthy
      postgres:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "-r", "exit(str_contains(@file_get_contents('/proc/1/cmdline') ?: '', 'queue:work') ? 0 : 1);"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 8s
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: orders
      POSTGRES_USER: orders_user
      POSTGRES_PASSWORD: orders_password

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
