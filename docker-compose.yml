services:
  nginx:
    image: nginx:1.27-alpine
    container_name: laravel_orders_nginx
    depends_on:
      - laravel_orders_php
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  laravel_orders_php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_orders_php
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
      - "8003:8003"
    environment:
      COMPOSER_ALLOW_SUPERUSER: "1"
    command: >
      sh -lc "
      if [ ! -f vendor/autoload.php ]; then
        composer install;
      fi &&
      php artisan serve --host=0.0.0.0 --port=8000
      "
    depends_on:
      - postgres
      - redis

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_orders_queue
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: >
      sh -lc "
      until [ -f vendor/autoload.php ]; do
        sleep 2;
      done &&
      php artisan queue:work redis --sleep=3 --tries=3 --timeout=90
      "
    depends_on:
      laravel_orders_php:
        condition: service_started
      postgres:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "-r", "exit(str_contains(@file_get_contents('/proc/1/cmdline') ?: '', 'queue:work') ? 0 : 1);"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 8s
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: orders
      POSTGRES_USER: orders_user
      POSTGRES_PASSWORD: orders_password

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
